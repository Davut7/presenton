user www-data;
worker_processes auto;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types; # Required for SVG mime type
  default_type application/octet-stream; # Required for SVG mime type
  client_max_body_size 100M;

  # Internal server — Puppeteer/Next.js access without auth (localhost only)
  server {
    listen 127.0.0.1:80;
    server_name localhost;

    location / {
      proxy_pass http://localhost:3000;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_read_timeout 30m;
      proxy_connect_timeout 30m;
    }

    location /api/v1/ {
      proxy_pass http://localhost:8000;
      proxy_read_timeout 30m;
      proxy_connect_timeout 30m;
    }

    location /api/ {
      proxy_pass http://localhost:3000;
      proxy_read_timeout 30m;
      proxy_connect_timeout 30m;
    }

    # Static
    location /static {
      alias /app/servers/fastapi/static/;
      expires 1y;
      add_header Cache-Control "public, immutable";
    }

    location /app_data/ {
      alias /app_data/;
      expires 1y;
      add_header Cache-Control "public, immutable";
    }
  }

  # External server — only API with key, no UI
  server {
    listen 80 default_server;
    server_name _;

    # API — requires X-API-Key (checked by FastAPI middleware)
    location /api/v1/ {
      proxy_pass http://localhost:8000;
      proxy_read_timeout 30m;
      proxy_connect_timeout 30m;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # Exported files — allow download
    location /app_data/exports/ {
      alias /app_data/exports/;
      expires 1y;
      add_header Cache-Control "public, immutable";
    }

    # Block everything else
    location / {
      return 403 '{"detail": "Access denied. Use API with X-API-Key header."}';
      add_header Content-Type application/json;
    }
  }
}